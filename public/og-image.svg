<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>
  
  <!-- Purple gradient background -->
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Colored panel -->
  <rect width="1200" height="630" fill="url(#purpleGradient)"/>
  
  <!-- Center logo box -->
  <rect x="400" y="165" width="400" height="300" rx="24" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
  
  <!-- JG Logo -->
  <circle cx="600" cy="315" r="120" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="360" font-size="96" font-weight="bold" text-anchor="middle" fill="#7e22ce" font-family="system-ui, -apple-system, sans-serif" letter-spacing="-2">JG</text>
  
  <!-- University text -->
  <text x="600" y="440" font-size="48" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">JG UNIVERSITY</text>
  
  <!-- Tagline -->
  <text x="600" y="480" font-size="24" text-anchor="middle" fill="#ffffff" opacity="0.9" font-family="system-ui, -apple-system, sans-serif">Empowering Minds, Shaping Futures</text>
</svg>